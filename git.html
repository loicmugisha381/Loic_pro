<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body bgcolor="margenta">
    <h1 style="width: 44px;; height: 44px;"><u><b></i></b></u></h1>

<div class="form-container">
<h1><i><b>REGSTER</b></i></h1>
    <form action="#" method="post">
<fieldset style="width: 600px; height: auto;">
          <label for="name">Enter First name:</label><br>
    <input type="text" placeholder="Enter first name " required name="n1"><br><br
     <label for="name"> Enter second name:</label>
    <br><input type="text" placeholder="Enter second name" required name="n2"><br><br>
        <textarea name="address" placeholder="Address" required></textarea>
        
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        
        <input type="tel" name="phone" placeholder="Phone Number">
        
        <button type="submit">Submit</button>
        </fieldset>
    </form>
</div>

</body>
</html>
