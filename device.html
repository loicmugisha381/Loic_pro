<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroStore - Electronics Company</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
}

header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

.hero {
    background: linear-gradient(to right, #004e92, #000428);
    color: white;
    padding: 60px 20px;
    text-align: center;
    font-size: 28px;
}

.category {
    padding: 40px 20px;
}

.category h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 26px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: contain;
}

.card h3 {
    margin: 10px 0 5px;
}

.card p {
    font-weight: bold;
    color: #004e92;
}

footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 40px;
}
</style>
</head>

<body>

<header>
    <h1>ElectroStore</h1>
    <nav>
        <a href="#tv">TVs</a>
        <a href="#phones">Phones</a>
        <a href="#cameras">Cameras</a>
        <a href="#cctv">CCTV</a>
        <a href="#computers">Computers</a>
    </nav>
</header>

<section class="hero">
    Your One-Stop Shop for Quality Electronics
</section>

<section id="tv" class="category">
    <h2>Televisions</h2>
    <div class="products" id="tvProducts"></div>
</section>

<section id="phones" class="category">
    <h2>Mobile Phones</h2>
    <div class="products" id="phoneProducts"></div>
</section>

<section id="cameras" class="category">
    <h2>Cameras</h2>
    <div class="products" id="cameraProducts"></div>
</section>

<section id="cctv" class="category">
    <h2>CCTV Systems</h2>
    <div class="products" id="cctvProducts"></div>
</section>

<section id="computers" class="category">
    <h2>Computers</h2>
    <div class="products" id="computerProducts"></div>
</section>

<footer>
    © 2026 ElectroStore Electronics Company
</footer>

<script>
const productsData = {
  tv: [
    {name: "Samsung 55'' 4K Smart TV", price: "$620", image: "https://images.pexels.com/photos/276583/pexels-photo-276583.jpeg"},
    {name: "LG OLED 65''", price: "$1200", image: "https://images.pexels.com/photos/167521/pexels-photo-167521.jpeg"},
    {name: "Sony Bravia 50''", price: "$820", image: "https://images.pexels.com/photos/164338/pexels-photo-164338.jpeg"},
    {name: "TCL 43'' LED", price: "$350", image: "https://images.pexels.com/photos/276586/pexels-photo-276586.jpeg"},
    {name: "Hisense 70'' UHD", price: "$970", image: "https://images.pexels.com/photos/1152864/pexels-photo-1152864.jpeg"}
  ],
  phones: [
    {name: "iPhone 15 Pro", price: "$999", image: "https://images.pexels.com/photos/6078129/pexels-photo-6078129.jpeg"},
    {name: "Samsung Galaxy S24", price: "$850", image: "https://images.pexels.com/photos/4042809/pexels-photo-4042809.jpeg"},
    {name: "Google Pixel 8", price: "$750", image: "https://images.pexels.com/photos/5082585/pexels-photo-5082585.jpeg"},
    {name: "OnePlus 12", price: "$680", image: "https://images.pexels.com/photos/4042807/pexels-photo-4042807.jpeg"},
    {name: "Xiaomi 14", price: "$620", image: "https://images.pexels.com/photos/47261/pexels-photo-47261.jpeg"}
  ],
  cameras: [
    {name: "Canon EOS R6", price: "$2000", image: "https://images.pexels.com/photos/167832/pexels-photo-167832.jpeg"},
    {name: "Nikon D850", price: "$1800", image: "https://images.pexels.com/photos/123918/pexels-photo-123918.jpeg"},
    {name: "Sony A7 III", price: "$1900", image: "https://images.pexels.com/photos/6916682/pexels-photo-6916682.jpeg"},
    {name: "Fujifilm X-T5", price: "$1700", image: "https://images.pexels.com/photos/2749734/pexels-photo-2749734.jpeg"},
    {name: "Panasonic GH6", price: "$1600", image: "https://images.pexels.com/photos/15359476/pexels-photo-15359476.jpeg"}
  ],
  cctv: [
    {name: "Hikvision 4-Cam Kit", price: "$450", image: "https://images.pexels.com/photos/1645009/pexels-photo-1645009.jpeg"},
    {name: "Dahua 8-Channel", price: "$700", image: "https://images.pexels.com/photos/4148861/pexels-photo-4148861.jpeg"},
    {name: "Reolink Wireless", price: "$500", image: "https://images.pexels.com/photos/3861485/pexels-photo-3861485.jpeg"},
    {name: "Swann Security Kit", price: "$650", image: "https://images.pexels.com/photos/5023045/pexels-photo-5023045.jpeg"},
    {name: "Arlo Pro 4", price: "$800", image: "https://images.pexels.com/photos/5082578/pexels-photo-5082578.jpeg"}
  ],
  computers: [
    {name: "Dell XPS 15", price: "$1400", image: "https://images.pexels.com/photos/265667/pexels-photo-265667.jpeg"},
    {name: "MacBook Pro M3", price: "$1800", image: "https://images.pexels.com/photos/18105/pexels-photo.jpg"},
    {name: "HP Spectre x360", price: "$1300", image: "https://images.pexels.com/photos/5082579/pexels-photo-5082579.jpeg"},
    {name: "Lenovo ThinkPad X1", price: "$1500", image: "https://images.pexels.com/photos/18105/pexels-photo-18105.jpeg"},
    {name: "Asus ROG Gaming PC", price: "$2200", image: "https://images.pexels.com/photos/5862202/pexels-photo-5862202.jpeg"}
  ]
};

function loadProducts(category, containerId) {
  const container = document.getElementById(containerId);
  productsData[category].forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <h3>${item.name}</h3>
      <p>${item.price}</p>
    `;
    container.appendChild(card);
  });
}

loadProducts("tv", "tvProducts");
loadProducts("phones", "phoneProducts");
loadProducts("cameras", "cameraProducts");
loadProducts("cctv", "cctvProducts");
loadProducts("computers", "computerProducts");
</script>

</body>
</html>
